workflows:
  android-debug-build:
    name: IP Transmitter - Debug Build
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Make gradlew executable
        script: |
          chmod +x gradlew
      - name: Build debug APK
        script: |
          ./gradlew assembleDebug
      - name: Show APK location
        script: |
          echo "=== Finding APK ==="
          find . -name "*.apk" -type f
          echo "=== Build outputs ==="
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug folder not found"
    artifacts:
      - app/build/outputs/apk/**/*.apk
      - app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - prasanth@daintreetech.com
        notify:
          success: true
          failure: true